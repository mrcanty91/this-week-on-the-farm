<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Document & workflow states: success, warning, danger, info, pending" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans)}
 .row{display:flex;gap:12px;max-width:700px}
 .c{flex:1;display:flex;flex-direction:column;gap:8px}
 .pill{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;padding:4px 10px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:600}
 .dot{width:8px;height:8px;border-radius:50%}
 .h{font-family:var(--font-mono);font-size:11px;color:var(--text-heading);font-weight:600}
 .t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">
 <div class="c"><span class="pill" style="background:var(--success-bg);color:var(--success)"><span class="dot" style="background:var(--success)"></span>Success</span><span class="h">#006E33</span><span class="t">--success</span></div>
 <div class="c"><span class="pill" style="background:var(--warning-bg);color:var(--warning)"><span class="dot" style="background:var(--warning-icon)"></span>Warning</span><span class="h">#B45309</span><span class="t">--warning</span></div>
 <div class="c"><span class="pill" style="background:var(--danger-bg);color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Danger</span><span class="h">#C0362C</span><span class="t">--danger</span></div>
 <div class="c"><span class="pill" style="background:var(--info-bg);color:var(--info)"><span class="dot" style="background:var(--info)"></span>Info</span><span class="h">#1D68BB</span><span class="t">--info</span></div>
 <div class="c"><span class="pill" style="background:var(--gray-100);color:var(--gray-600)"><span class="dot" style="background:var(--pending)"></span>Pending</span><span class="h">#9AA3A9</span><span class="t">--pending</span></div>
</div>
</body></html>
