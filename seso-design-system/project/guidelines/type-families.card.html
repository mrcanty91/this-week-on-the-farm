<!-- @dsCard group="Type" viewport="700x230" name="Font families" subtitle="Plus Jakarta Sans (brand + UI) · IBM Plex Mono (data)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 body{margin:0;padding:24px;background:var(--surface)}
 .wrap{max-width:700px;display:flex;flex-direction:column;gap:22px}
 .lab{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:6px}
 .sans{font-family:var(--font-sans);color:var(--text-heading)}
 .mono{font-family:var(--font-mono);color:var(--text-heading)}
 .big{font-size:40px;font-weight:800;letter-spacing:-.02em;line-height:1}
 .ag{font-size:15px;color:var(--text-body);margin-top:6px}
</style></head><body>
<div class="wrap">
 <div>
  <div class="lab">PLUS JAKARTA SANS · brand + interface</div>
  <div class="sans big">Run your season with Seso</div>
  <div class="sans ag">AaBbCcDd 0123456789 — friendly geometric grotesque, weights 400–800</div>
 </div>
 <div>
  <div class="lab">IBM PLEX MONO · IDs, case numbers, currency</div>
  <div class="mono" style="font-size:24px;font-weight:600;line-height:1.2">H-300-21152-359042</div>
  <div class="mono ag" style="font-feature-settings:'tnum'">18095 · $2,050.80 · 46.00 hrs</div>
 </div>
</div>
</body></html>
