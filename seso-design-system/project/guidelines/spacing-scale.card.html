<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4px base grid — most UI rhythm lives in 8–24px" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-sans)}
 .wrap{max-width:700px;display:flex;flex-direction:column;gap:9px}
 .r{display:flex;align-items:center;gap:14px}
 .bar{height:16px;background:var(--green-600);border-radius:3px}
 .m{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:120px;flex:none}
</style></head><body>
<div class="wrap">
 <div class="r"><span class="m">1 · 4px</span><div class="bar" style="width:4px"></div></div>
 <div class="r"><span class="m">2 · 8px</span><div class="bar" style="width:8px"></div></div>
 <div class="r"><span class="m">3 · 12px</span><div class="bar" style="width:12px"></div></div>
 <div class="r"><span class="m">4 · 16px</span><div class="bar" style="width:16px"></div></div>
 <div class="r"><span class="m">6 · 24px</span><div class="bar" style="width:24px"></div></div>
 <div class="r"><span class="m">8 · 32px</span><div class="bar" style="width:32px"></div></div>
 <div class="r"><span class="m">12 · 48px</span><div class="bar" style="width:48px"></div></div>
 <div class="r"><span class="m">16 · 64px</span><div class="bar" style="width:64px"></div></div>
</div>
</body></html>
