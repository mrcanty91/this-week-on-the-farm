<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 body{margin:0;padding:18px;background:var(--surface);font-family:var(--font-sans)}
 .row{display:flex;gap:14px;max-width:700px}
 .tile{flex:1;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;height:120px;border:1px solid var(--border-hairline)}
 .cap{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:8px;display:block;text-align:center}
</style></head><body>
<div>
 <div class="row">
  <div style="flex:1.6"><div class="tile" style="background:var(--green-600)"><img src="../assets/logo-lockup.png" alt="Seso lockup" style="height:62px"/></div><span class="cap">Primary lockup · on brand green</span></div>
  <div style="flex:1"><div class="tile" style="background:var(--navy-900)"><img src="../assets/logomark-white.png" alt="Seso mark" style="height:64px"/></div><span class="cap">Mark · on dark</span></div>
  <div style="flex:1"><div class="tile" style="background:var(--surface)"><img src="../assets/logomark-green.png" alt="Seso mark green" style="height:64px"/></div><span class="cap">Mark · on light</span></div>
 </div>
</div>
</body></html>
