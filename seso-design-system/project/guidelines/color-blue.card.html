<!-- @dsCard group="Colors" viewport="700x150" name="Blue ramp" subtitle="Primary actions, links & focus — built around #1D68BB" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans)}
 .ramp{display:flex;gap:10px;max-width:700px}
 .c{flex:1;display:flex;flex-direction:column;gap:6px}
 .chip{height:60px;border-radius:var(--radius-md);border:1px solid rgba(7,31,47,.06)}
 .t{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
 .h{font-family:var(--font-mono);font-size:11px;color:var(--text-heading);font-weight:600}
</style></head><body>
<div class="ramp">
 <div class="c"><div class="chip" style="background:var(--blue-700)"></div><span class="h">#14538F</span><span class="t">700</span></div>
 <div class="c"><div class="chip" style="background:var(--blue-600)"></div><span class="h">#1D68BB</span><span class="t">600 ·action</span></div>
 <div class="c"><div class="chip" style="background:var(--blue-500)"></div><span class="h">#2E7FD6</span><span class="t">500</span></div>
 <div class="c"><div class="chip" style="background:var(--blue-200)"></div><span class="h">#B9D5EF</span><span class="t">200</span></div>
 <div class="c"><div class="chip" style="background:var(--blue-100)"></div><span class="h">#E2EEF9</span><span class="t">100</span></div>
 <div class="c"><div class="chip" style="background:var(--blue-50)"></div><span class="h">#F1F7FC</span><span class="t">50</span></div>
</div>
</body></html>
