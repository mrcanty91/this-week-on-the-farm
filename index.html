<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This Week on the Farm</title>
  <meta name="description" content="Turn the weather forecast into plain-English farm decisions: irrigate, spray, harvest, and crew scheduling calls." />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>🌦️ This Week on the Farm</h1>
      <p class="app__tagline">Type a location, get this week's farm decisions.</p>
    </header>

    <form id="location-form" class="search" autocomplete="off">
      <input
        id="location-input"
        class="search__input"
        type="text"
        placeholder="Town or ZIP (e.g. Salinas, CA)"
        aria-label="Location"
      />
      <button class="search__btn" type="submit">Get plan</button>
      <button class="search__geo" type="button" id="geo-btn" title="Use my location">📍</button>
    </form>

    <section id="results" class="results" aria-live="polite">
      <p class="results__empty">Enter a location to see this week's crop and crew calls.</p>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
